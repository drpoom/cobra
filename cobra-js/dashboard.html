<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>COBRA — BMM350</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #111; --border: #222; --accent: #e94560;
            --green: #44ff44; --red: #ff4444; --blue: #339af0;
            --text: #e0e0e0; --dim: #666; --muted: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
               background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh;
               overflow-x: hidden; }

        header { background: linear-gradient(135deg, #1a1a2e, #16213e);
                 padding: 1rem 1.25rem; border-bottom: 2px solid #0f3460;
                 position: sticky; top: 0; z-index: 10; }
        h1 { font-size: 1.3rem; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
        h1 .tag { color: var(--dim); font-size: 0.75rem; font-weight: normal;
                  background: #1a1a2e; padding: 2px 8px; border-radius: 4px; }
        .subtitle { color: var(--dim); font-size: 0.75rem; margin-top: 0.2rem; }

        main { max-width: 600px; margin: 0 auto; padding: 1rem; }

        .card { background: var(--card); border: 1px solid var(--border);
                border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .card h2 { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.75rem; }

        button { background: var(--accent); color: #fff; border: none;
                 padding: 0.65rem 1.25rem; border-radius: 8px;
                 font-family: inherit; font-size: 0.9rem; cursor: pointer;
                 transition: all 0.15s; width: 100%; font-weight: 600; }
        button:active { transform: scale(0.97); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
        button.secondary { background: #1a1a2e; border: 1px solid var(--border); color: var(--text); }

        .led { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
               background: #333; margin-right: 6px; vertical-align: middle; }
        .led.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .led.err { background: var(--red); box-shadow: 0 0 6px var(--red); }
        #status-text { font-size: 0.85rem; color: var(--muted); }

        .info-row { display: flex; justify-content: space-between; padding: 0.4rem 0;
                    border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--muted); }
        .info-value { color: var(--green); font-weight: 700; }

        .compass { width: 200px; height: 200px; margin: 1rem auto; position: relative; }
        .compass canvas { width: 100%; height: 100%; }
        .compass-heading { position: absolute; bottom: -1.5rem; left: 50%; transform: translateX(-50%);
                           font-size: 1.8rem; font-weight: 900; color: var(--accent); }

        .axes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; text-align: center; }
        .axis { background: var(--bg); border-radius: 8px; padding: 0.75rem 0.25rem; }
        .axis-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
                      letter-spacing: 2px; }
        .axis-val { font-size: 1.8rem; font-weight: 900; margin: 0.25rem 0;
                    font-variant-numeric: tabular-nums; }
        .axis-unit { font-size: 0.65rem; color: var(--dim); }
        .x .axis-val { color: #ff6b6b; }
        .y .axis-val { color: #51cf66; }
        .z .axis-val { color: var(--blue); }

        .temp-display { text-align: center; margin-top: 0.75rem; font-size: 0.9rem; }
        .temp-val { color: #ffa94d; font-weight: 700; font-size: 1.2rem; }

        .controls { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .controls button { width: auto; flex: 1; min-width: 0; }
        select { background: #1a1a2e; color: var(--text); border: 1px solid var(--border);
                 padding: 0.5rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; }

        .counter { text-align: center; color: var(--dim); font-size: 0.8rem; margin-top: 0.5rem; }

        .toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;
                      font-size: 0.85rem; color: var(--muted); }
        .toggle-row input[type="checkbox"] { accent-color: var(--accent); }

        .log { background: #050505; border: 1px solid var(--border); border-radius: 8px;
               padding: 0.75rem; max-height: 140px; overflow-y: auto; font-size: 0.75rem;
               line-height: 1.5; -webkit-overflow-scrolling: touch; }
        .log-entry { color: var(--muted); word-break: break-all; }
        .log-entry.ok { color: var(--green); }
        .log-entry.err { color: var(--red); }
        .log-entry.info { color: var(--blue); }

        .hidden { display: none !important; }

        @media (max-width: 360px) {
            .axis-val { font-size: 1.4rem; }
            .compass { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🐍 COBRA <span class="tag">V4.1</span></h1>
        <div class="subtitle">BMM350 Magnetometer — Bosch SensorAPI v1.10.0</div>
    </header>

    <main>
        <!-- Connect -->
        <div class="card">
            <button id="btn-connect" onclick="handleConnect('serial')">🔌 Connect USB</button>
            <button id="btn-connect-ble" onclick="handleConnect('ble')">📡 Connect BLE</button>
            <div style="margin-top:0.6rem">
                <span class="led" id="led"></span>
                <span id="status-text">Not connected</span>
            </div>
        </div>

        <!-- Board Info -->
        <div class="card hidden" id="card-info">
            <h2>📋 Board</h2>
            <div id="info-rows"></div>
        </div>

        <!-- Sensor -->
        <div class="card hidden" id="card-sensor">
            <h2>🧲 BMM350</h2>
            <div class="info-row">
                <span class="info-label">Chip ID</span>
                <span class="info-value" id="chip-id">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Power Mode</span>
                <span class="info-value" id="power-mode">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">OTP</span>
                <span class="info-value" id="otp-status">—</span>
            </div>
            <div class="controls">
                <button id="btn-monitor" onclick="toggleMonitor()">▶ Start</button>
                <select id="sel-odr">
                    <option value="25">25 Hz</option>
                    <option value="50">50 Hz</option>
                    <option value="100" selected>100 Hz</option>
                    <option value="200">200 Hz</option>
                    <option value="400">400 Hz</option>
                </select>
            </div>
            <div class="toggle-row">
                <input type="checkbox" id="chk-compensated">
                <label for="chk-compensated">OTP Compensation</label>
            </div>
        </div>

        <!-- Live Data -->
        <div class="card hidden" id="card-data">
            <h2>📊 Live</h2>
            <div class="compass">
                <canvas id="compass-canvas" width="200" height="200"></canvas>
                <div class="compass-heading" id="heading">—°</div>
            </div>
            <div class="axes">
                <div class="axis x">
                    <div class="axis-label">X</div>
                    <div class="axis-val" id="val-x">0.00</div>
                    <div class="axis-unit">μT</div>
                </div>
                <div class="axis y">
                    <div class="axis-label">Y</div>
                    <div class="axis-val" id="val-y">0.00</div>
                    <div class="axis-unit">μT</div>
                </div>
                <div class="axis z">
                    <div class="axis-label">Z</div>
                    <div class="axis-val" id="val-z">0.00</div>
                    <div class="axis-unit">μT</div>
                </div>
            </div>
            <div class="temp-display">
                🌡️ <span class="temp-val" id="val-temp">—</span> °C
            </div>
            <div class="counter">
                Samples: <span id="sample-count">0</span>
                &nbsp;·&nbsp;
                Rate: <span id="sample-rate">0</span> Hz
            </div>
        </div>

        <!-- Log -->
        <div class="card">
            <h2>📝 Log</h2>
            <div class="log" id="log"></div>
        </div>
    </main>

    <script type="module">
        import { SerialTransport, BleTransport } from './src/transport.js';
        import { CobraBridge } from './src/sync.js';
        import { BMM350 } from './src/drivers/bmm350.js';
        import { BMM350_CHIP_ID, BMM350_PMU, BMM350_ODR } from './src/constants.js';

        let bridge = null;
        let sensor = null;
        let monitoring = false;
        let sampleCount = 0;
        let startTime = 0;

        // ── Logging ──────────────────────────────────────────────────────

        function log(msg, type = '') {
            const el = document.getElementById('log');
            const ts = new Date().toLocaleTimeString();
            el.innerHTML += `<div class="log-entry ${type}">[${ts}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(text, ledClass = '') {
            document.getElementById('status-text').textContent = text;
            const led = document.getElementById('led');
            led.className = 'led' + (ledClass ? ' ' + ledClass : '');
        }

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        // ── Compass Drawing ──────────────────────────────────────────────

        function drawCompass(x, y) {
            const canvas = document.getElementById('compass-canvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2, r = Math.min(cx, cy) - 10;

            ctx.clearRect(0, 0, w, h);

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.stroke();

            for (let i = 0; i < 36; i++) {
                const a = (i * 10) * Math.PI / 180;
                const len = i % 9 === 0 ? 12 : 4;
                const x1 = cx + (r - len) * Math.sin(a);
                const y1 = cy - (r - len) * Math.cos(a);
                const x2 = cx + r * Math.sin(a);
                const y2 = cy - r * Math.cos(a);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = i % 9 === 0 ? '#555' : '#333';
                ctx.lineWidth = i % 9 === 0 ? 2 : 1;
                ctx.stroke();
            }

            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('N', cx, cy - r + 20);
            ctx.fillText('S', cx, cy + r - 12);
            ctx.fillText('E', cx + r - 16, cy + 4);
            ctx.fillText('W', cx - r + 16, cy + 4);

            const heading = Math.atan2(y, x);
            const needleLen = r - 20;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(heading - Math.PI / 2);

            ctx.beginPath();
            ctx.moveTo(0, -needleLen);
            ctx.lineTo(-5, 0);
            ctx.lineTo(5, 0);
            ctx.closePath();
            ctx.fillStyle = '#e94560';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(0, needleLen * 0.4);
            ctx.lineTo(-4, 0);
            ctx.lineTo(4, 0);
            ctx.closePath();
            ctx.fillStyle = '#333';
            ctx.fill();

            ctx.restore();

            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#e94560';
            ctx.fill();
        }

        // ── Connection ──────────────────────────────────────────────────

        window.handleConnect = async (transportType = 'serial') => {
            try {
                const transport = transportType === 'ble'
                    ? new BleTransport()
                    : new SerialTransport();
                bridge = new CobraBridge(transport);
                await bridge.connect();
                setStatus('Connected', 'on');
                const label = transportType === 'ble' ? 'BLE' : 'USB';
                document.getElementById('btn-connect').textContent = `🔌 ${label} Connected`;
                document.getElementById('btn-connect').disabled = true;
                document.getElementById('btn-connect-ble').disabled = true;
                log(`${label} connected`, 'ok');

                // Create sensor instance
                sensor = new BMM350(bridge);

                // Init sensor (soft reset + OTP + magnetic reset)
                try {
                    await sensor.init();
                    log('BMM350 initialized (soft reset + OTP + magnetic reset)', 'ok');
                } catch (e) {
                    log('Init warning: ' + e.message + ' (continuing)', 'err');
                }

                // Chip ID
                show('card-sensor');
                const chipId = await sensor.getChipId();
                document.getElementById('chip-id').textContent =
                    `0x${chipId.toString(16).padStart(2, '0')}`;

                if (chipId === BMM350_CHIP_ID) {
                    log(`BMM350 Chip ID: 0x${chipId.toString(16).padStart(2, '0')} ✓`, 'ok');
                } else {
                    log(`Chip ID 0x${chipId.toString(16).padStart(2, '0')} — expected 0x33`, 'err');
                }

                // Power mode
                const mode = await sensor.getPowerMode();
                document.getElementById('power-mode').textContent = mode;

                // OTP status
                document.getElementById('otp-status').textContent =
                    sensor.otpLoaded ? '✅ Loaded' : '❌ Not loaded';

                // Board info
                try {
                    const info = await bridge.getBoardInfo();
                    show('card-info');
                    const rows = document.getElementById('info-rows');
                    rows.innerHTML = '';
                    for (const [k, v] of Object.entries(info)) {
                        if (k === 'raw') continue;
                        const display = typeof v === 'number'
                            ? `0x${v.toString(16).padStart(4, '0')}` : v;
                        rows.innerHTML += `<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${display}</span></div>`;
                    }
                    log('Board info retrieved', 'ok');
                } catch (e) {
                    log('Board info: ' + e.message, 'err');
                }

            } catch (e) {
                log('Connection failed: ' + e.message, 'err');
                setStatus('Error', 'err');
                bridge = null;
                sensor = null;
            }
        };

        // ── Monitor ─────────────────────────────────────────────────────

        window.toggleMonitor = async () => {
            if (!bridge || !sensor) return;
            const btn = document.getElementById('btn-monitor');

            if (!monitoring) {
                // Start
                const odrHz = parseInt(document.getElementById('sel-odr').value);

                // Use BMM350 class API (same as Python)
                await sensor.setPowerMode('nm');
                await sensor.setOdr(odrHz);

                monitoring = true;
                sampleCount = 0;
                startTime = performance.now();
                btn.textContent = '⏹ Stop';
                btn.style.background = '#ff4444';
                show('card-data');
                log(`Monitoring @ ${odrHz} Hz (24-bit Bosch conversion)`, 'info');

                const pollInterval = 1000 / (odrHz * 2);
                const readLoop = async () => {
                    if (!monitoring) return;
                    try {
                        const compensated = document.getElementById('chk-compensated').checked;
                        const data = await sensor.readMagData(compensated);

                        document.getElementById('val-x').textContent = data.x.toFixed(2);
                        document.getElementById('val-y').textContent = data.y.toFixed(2);
                        document.getElementById('val-z').textContent = data.z.toFixed(2);
                        document.getElementById('val-temp').textContent = data.temperature.toFixed(1);
                        sampleCount++;

                        const elapsed = (performance.now() - startTime) / 1000;
                        document.getElementById('sample-count').textContent = sampleCount;
                        document.getElementById('sample-rate').textContent =
                            (sampleCount / elapsed).toFixed(1);

                        drawCompass(data.x, data.y);
                        const heading = Math.atan2(data.y, data.x) * 180 / Math.PI;
                        document.getElementById('heading').textContent =
                            `${((heading + 360) % 360).toFixed(0)}°`;
                    } catch (e) {
                        log('Read error: ' + e.message, 'err');
                    }
                    if (monitoring) {
                        setTimeout(readLoop, pollInterval);
                    }
                };
                readLoop();

            } else {
                // Stop
                monitoring = false;
                btn.textContent = '▶ Start';
                btn.style.background = '';
                try {
                    await sensor.setPowerMode('suspend');
                } catch {}
                log(`Stopped (${sampleCount} samples)`, 'info');
            }
        };

        // ── Init ────────────────────────────────────────────────────────

        drawCompass(0, 0);
        log('COBRA.js — BMM350 driver with Bosch SensorAPI v1.10.0 conversion', 'info');
        log('24-bit data, official μT/°C coefficients, OTP compensation', 'info');
        log('Ready. Connect your Bosch AppBoard 3.1 via USB.', 'info');
    </script>
</body>
</html>
